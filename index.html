<html>
<head>
    <title>Healthy Cart</title>
</head>
<body>
    <h1>Your Healthy Cart</h1>
    <div>
        <h2>Total Sugar Tracking</h2>
        <p id="total-sugar">Total Sugar: <span>0g</span></p>
        <script>
            // A script to calculate total sugar in the cart
            let totalSugar = 0;
            function updateTotalSugar(productSugar) {
                totalSugar += productSugar;
                document.getElementById('total-sugar').children[0].innerText = totalSugar + 'g';
            }
        </script>
    </div>
    <div>
        <h2>Diet-Friendly Products</h2>
        <ul>
            <li>Product A - <strong>Health Tip:</strong> Great source of fiber!</li>
            <li>Product B - <strong>Health Tip:</strong> Low in calories, perfect for snacking!</li>
            <li>Product C - <strong>Health Tip:</strong> Rich in antioxidants, helps boost immunity!</li>
        </ul>
    </div>
</body>
</html>
